<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LetsGo 项目文档中心</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; overflow: hidden; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "PingFang SC", "Microsoft YaHei", sans-serif;
            display: flex;
            background: #f5f7fa;
            color: #333;
        }
        .sidebar {
            width: 280px;
            min-width: 280px;
            height: 100vh;
            background: #1e1e2e;
            color: #cdd6f4;
            display: flex;
            flex-direction: column;
            box-shadow: 2px 0 12px rgba(0, 0, 0, 0.15);
            z-index: 10;
        }
        .sidebar-header {
            padding: 24px 20px 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }
        .sidebar-header h1 {
            font-size: 1.3em;
            color: #cba6f7;
            font-weight: 700;
            letter-spacing: 1px;
        }
        .sidebar-header p {
            font-size: 0.82em;
            color: #6c7086;
            margin-top: 6px;
        }
        .nav-list {
            flex: 1;
            overflow-y: auto;
            padding: 12px 0;
        }
        .nav-label {
            padding: 8px 20px 6px;
            font-size: 0.72em;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #585b70;
            font-weight: 600;
        }
        .nav-item {
            display: flex;
            align-items: center;
            padding: 12px 20px;
            cursor: pointer;
            transition: all 0.2s ease;
            border-left: 3px solid transparent;
            text-decoration: none;
            color: #a6adc8;
            font-size: 0.92em;
            line-height: 1.4;
        }
        .nav-item:hover {
            background: rgba(203, 166, 247, 0.08);
            color: #cdd6f4;
        }
        .nav-item.active {
            background: rgba(203, 166, 247, 0.12);
            border-left-color: #cba6f7;
            color: #cba6f7;
            font-weight: 600;
        }
        .nav-icon {
            width: 28px;
            height: 28px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 12px;
            font-size: 0.8em;
            font-weight: 700;
            flex-shrink: 0;
        }
        .nav-icon-1 { background: rgba(137, 180, 250, 0.2); color: #89b4fa; }
        .nav-icon-2 { background: rgba(243, 139, 168, 0.2); color: #f38ba8; }
        .nav-icon-3 { background: rgba(203, 166, 247, 0.2); color: #cba6f7; }
        .nav-icon-4 { background: rgba(166, 227, 161, 0.2); color: #a6e3a1; }
        .nav-icon-5 { background: rgba(250, 179, 135, 0.2); color: #fab387; }
        .nav-icon-6 { background: rgba(148, 226, 213, 0.2); color: #94e2d5; }
        .nav-icon-7 { background: rgba(245, 194, 231, 0.2); color: #f5c2e7; }
        .nav-text { flex: 1; }
        .content {
            flex: 1;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: #fff;
        }
        .content-header {
            padding: 14px 24px;
            background: #fff;
            border-bottom: 1px solid #e8ecf1;
            display: flex;
            align-items: center;
            min-height: 52px;
        }
        .content-header .breadcrumb {
            font-size: 0.88em;
            color: #888;
        }
        .content-header .breadcrumb span {
            color: #333;
            font-weight: 600;
        }
        .content-frame {
            flex: 1;
            border: none;
            width: 100%;
            height: 100%;
        }
        .nav-list::-webkit-scrollbar { width: 4px; }
        .nav-list::-webkit-scrollbar-track { background: transparent; }
        .nav-list::-webkit-scrollbar-thumb { background: #45475a; border-radius: 2px; }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="sidebar-header">
        <h1>LetsGo 文档中心</h1>
        <p>项目技术文档汇总</p>
    </div>
    <div class="nav-list">
        <div class="nav-label">文档目录</div>
        <div class="nav-item active" onclick="loadPage(this, 'Commercial_Animation_System_Doc.html', '狼人杀商业动画系统')">
            <div class="nav-icon nav-icon-1">01</div>
            <span class="nav-text">狼人杀商业动画系统</span>
        </div>
        <div class="nav-item" onclick="loadPage(this, 'ReturnActivity_Guide.html', '狼人回归系统')">
            <div class="nav-icon nav-icon-2">02</div>
            <span class="nav-text">狼人回归系统 (ReturnActivity)</span>
        </div>
        <div class="nav-item" onclick="loadPage(this, 'TheProphetCheckWolf.html', '预言家功能逻辑')">
            <div class="nav-icon nav-icon-3">03</div>
            <span class="nav-text">预言家 (CheckWolf) 功能逻辑</span>
        </div>
        <div class="nav-item" onclick="loadPage(this, 'TreasureHunt_Guide.html', '寻宝模式新手引导')">
            <div class="nav-icon nav-icon-4">04</div>
            <span class="nav-text">寻宝模式 (TreasureHunt) 新手引导</span>
        </div>
        <div class="nav-item" onclick="loadPage(this, 'TreasureSystem.html', '狼人珍宝系统')">
            <div class="nav-icon nav-icon-5">05</div>
            <span class="nav-text">狼人珍宝系统</span>
        </div>
        <div class="nav-item" onclick="loadPage(this, 'VocationMastery_System_Analysis.html', '狼人专精系统')">
            <div class="nav-icon nav-icon-6">06</div>
            <span class="nav-text">狼人专精系统 - 全面梳理与分析</span>
        </div>
        <div class="nav-item" onclick="loadPage(this, 'HideAndSeek_Disguise_Effect_TechDoc.html', '躲猫猫伪装特效系统')">
            <div class="nav-icon nav-icon-7">07</div>
            <span class="nav-text">躲猫猫伪装特效系统</span>
        </div>
        <div class="nav-item" onclick="loadPage(this, 'NR3E1_HideAndSeek_E1_TechDoc.html', '躲猫猫E1模块架构')">
            <div class="nav-icon nav-icon-1">08</div>
            <span class="nav-text">躲猫猫 E1 模块架构文档</span>
        </div>
    </div>
</div>

<div class="content">
    <div class="content-header">
        <div class="breadcrumb">文档中心 / <span id="current-doc">狼人杀商业动画系统</span></div>
    </div>
    <iframe id="doc-frame" class="content-frame" src="Commercial_Animation_System_Doc.html"></iframe>
</div>

<script>
    function loadPage(el, url, title) {
        document.querySelectorAll(".nav-item").forEach(function(item) {
            item.classList.remove("active");
        });
        el.classList.add("active");
        document.getElementById("current-doc").textContent = title;
        document.getElementById("doc-frame").src = url;
    }
</script>

</body>
</html>
