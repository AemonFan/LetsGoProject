
<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UE4 性能分析与优化 - 文档中心</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif; display: flex; height: 100vh; overflow: hidden; background: #f0f2f5; }
.sidebar { width: 300px; min-width: 300px; background: linear-gradient(180deg, #1a1a2e 0%, #16213e 100%); color: #fff; display: flex; flex-direction: column; box-shadow: 2px 0 12px rgba(0,0,0,0.15); z-index: 10; }
.sidebar-header { padding: 28px 24px 20px; border-bottom: 1px solid rgba(255,255,255,0.1); }
.sidebar-header h1 { font-size: 1.3em; font-weight: 700; color: #fff; margin-bottom: 4px; }
.sidebar-header .subtitle { font-size: 0.85em; color: #8899aa; }
.sidebar-nav { flex: 1; padding: 16px 12px; overflow-y: auto; }
.nav-section-title { font-size: 0.75em; text-transform: uppercase; letter-spacing: 1.5px; color: #6c7a89; padding: 12px 12px 8px; margin-top: 8px; }
.nav-btn { display: flex; align-items: center; width: 100%; padding: 14px 16px; margin: 4px 0; border: none; border-radius: 8px; background: transparent; color: #b0bec5; font-size: 0.95em; cursor: pointer; transition: all 0.2s; text-align: left; font-family: inherit; }
.nav-btn:hover { background: rgba(255,255,255,0.08); color: #fff; }
.nav-btn.active { background: rgba(52,152,219,0.25); color: #3498db; font-weight: 600; box-shadow: inset 3px 0 0 #3498db; }
.nav-btn .icon { margin-right: 12px; font-size: 1.2em; width: 24px; text-align: center; }
.nav-btn .label { flex: 1; line-height: 1.4; }
.nav-btn .badge { background: #3498db; color: white; font-size: 0.7em; padding: 2px 8px; border-radius: 10px; margin-left: 8px; }
.main-content { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.toolbar { padding: 12px 24px; background: #fff; border-bottom: 1px solid #e0e0e0; display: flex; align-items: center; box-shadow: 0 1px 4px rgba(0,0,0,0.05); }
.toolbar .page-title { font-size: 0.9em; color: #666; }
.toolbar .page-title strong { color: #2c3e50; }
.content-frame { flex: 1; border: none; width: 100%; height: 100%; background: #f8f9fa; }
.welcome { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #999; padding: 40px; }
.welcome .emoji { font-size: 4em; margin-bottom: 24px; }
.welcome h2 { font-size: 1.5em; color: #555; margin-bottom: 12px; }
.welcome p { font-size: 1em; color: #888; max-width: 400px; text-align: center; line-height: 1.6; }
.sidebar-footer { padding: 16px 20px; border-top: 1px solid rgba(255,255,255,0.1); font-size: 0.8em; color: #556; }
</style>
</head>
<body>
<div class="sidebar">
    <div class="sidebar-header">
        <h1>📊 性能分析与优化</h1>
        <div class="subtitle">LetsGo (UE4) 文档中心</div>
    </div>
    <nav class="sidebar-nav">
        <div class="nav-section-title">📁 文档列表</div>
        <button class="nav-btn active" onclick="loadPage('welcome',this)">
            <span class="icon">🏠</span><span class="label">首页</span>
        </button>
        <button class="nav-btn" onclick="loadPage('UE4性能优化工具汇总.html',this)">
            <span class="icon">📋</span><span class="label">UE4 性能优化工具汇总</span><span class="badge">8类工具</span>
        </button>
        <button class="nav-btn" onclick="loadPage('UE4性能优化工具stat unit的应用.html',this)">
            <span class="icon">🔍</span><span class="label">stat unit 的应用</span><span class="badge">实战案例</span>
        </button>
    </nav>
    <div class="sidebar-footer">
        <div>适用项目：LetsGo (UE4)</div>
        <div>文档日期：2026-03-25</div>
    </div>
</div>
<div class="main-content">
    <div class="toolbar">
        <span class="page-title" id="pt">📄 当前页面：<strong>首页</strong></span>
    </div>
    <div class="welcome" id="wp">
        <div class="emoji">🎮</div>
        <h2>UE4 性能分析与优化文档中心</h2>
        <p>点击左侧导航栏选择要查看的文档。<br>本文档中心包含 UE4 性能优化工具总览和 stat unit 实战应用两篇文档。</p>
    </div>
    <iframe class="content-frame" id="cf" style="display:none;"></iframe>
</div>
<script>
var T={'welcome':'首页','UE4性能优化工具汇总.html':'UE4 性能优化工具汇总','UE4性能优化工具stat unit的应用.html':'stat unit 的应用'};
function loadPage(p,b){
    document.querySelectorAll('.nav-btn').forEach(function(x){x.classList.remove('active')});
    b.classList.add('active');
    document.getElementById('pt').innerHTML='📄 当前页面：<strong>'+(T[p]||p)+'</strong>';
    var w=document.getElementById('wp'),f=document.getElementById('cf');
    if(p==='welcome'){w.style.display='flex';f.style.display='none';}
    else{w.style.display='none';f.style.display='block';f.src=p;}
}
</script>
</body>
</html>
